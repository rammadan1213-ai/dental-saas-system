<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DentalCare Pro</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="loginScreen" class="login-screen">
  <div class="login-box">
    <h2>🦷 DentalCare Pro</h2>
    <input type="email" id="loginEmail" placeholder="Email">
    <input type="password" id="loginPassword" placeholder="Password">
    <button id="loginBtn">Login</button>
    <div id="loginError"></div>
  </div>
</div>

<div id="mainContainer" class="container">
  <div class="sidebar">
    <button class="nav-link" data-section="dashboard">Dashboard</button>
    <button class="nav-link" data-section="patients">Patients</button>
    <button class="nav-link logout-btn">Logout</button>
  </div>

  <div class="main-content">
    <div id="dashboard" class="section active">
      <h2>Dashboard</h2>
      <h3>Total Patients: <span id="totalPatients">0</span></h3>
    </div>

    <div id="patients" class="section">
      <h2>Patients</h2>
      <input id="patientName" placeholder="Name">
      <input id="patientPhone" placeholder="Phone">
      <input id="patientEmail" placeholder="Email">
      <button id="savePatientBtn">Save</button>

      <table>
        <tbody id="patientsTableBody"></tbody>
      </table>
    </div>
  </div>
</div>

<script type="module" src="script.js"></script>
</body>
</html>
